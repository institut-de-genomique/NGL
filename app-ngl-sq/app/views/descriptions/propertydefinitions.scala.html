@this()
@()
@import views.html.helper._

@form() = {
	@columnSearchForm{
		@formGroup{	
			<div bt-select placeholder="@Messages("descriptions.select.propertydefinitions.codes")" class="form-control" ng-model="searchService.form.codes" textarea="true" filter="true" multiple="true" bt-options="propertDefinition.code for propertDefinition in searchService.lists.getPropertyDefinitions()">
			</div>
		}		
	}
	@columnSearchForm{
		@formGroup{
			<div bt-select placeholder="@Messages("descriptions.select.propertydefinitions.import.types.names")" class="form-control" ng-model="searchService.form.typeNames" textarea="true" multiple="true" bt-options="importType.name for importType in searchService.lists.getImportTypes()">
			</div>				
		}		
	}
}

<div class="row">
	<div class="col-md-12 col-lg-12"  messages="messages"></div>
</div>
<div class="row"> 
<div class="col-md-12 col-lg-12" ultimate-datatable="searchService.datatable">
	<div udt-form>

	<div class="tab-content">
			<div class="tab-pane active" id="filters">
				<form class="well well-small">
				<div class="row">
				@form
				@columnSearchForm{
					@formGroup{
					<div class="btn-toolbar">
						<button type="submit" title='@Messages("button.search")' data-toggle="tooltip" ng-click="search()" class="btn btn-primary" >
							<i class="fa fa-search"></i>
						</button>
						<button title='@Messages("button.reset")' data-toggle="tooltip" ng-click="reset()"  class="btn btn-default">
							<i class="fa fa-undo"></i>
						</button>
														
					</div>	
					}
				}
				</div>		
			</form>	
		</div>
</div>
